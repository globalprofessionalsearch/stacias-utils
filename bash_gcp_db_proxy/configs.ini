# Database configurations for Cloud SQL connections
# Each section represents a different database instance
#
# Format:
# [config-name]
# project_id=GCP project ID
# instance_name=Cloud SQL instance name
# region=GCP region
# zone=GCP zone (for bastion VM)
# bastion_name=Name of the bastion VM
# local_port=Local port for SSH tunnel
# db_name=Database name
# db_user=Database username

[inventory-registrar-prod]
project_id=solo-infrastructure
instance_name=inventory-registrar
region=us-east1
zone=us-east1-b
bastion_name=sql-bastion
local_port=6668
db_name=inventory-registrar
db_user=inventory-user

[inventory-registrar-clone]
project_id=solo-infrastructure
instance_name=inventory-registrar-clone-for-stacia
region=us-east1
zone=us-east1-b
bastion_name=sql-bastion
local_port=6665
db_name=inventory-registrar
db_user=inventory-user

[solo-platform-api-prod]
project_id=solo-infrastructure
instance_name=solo-platform-api-postgresql-3
region=us-east1
zone=us-east1-b
bastion_name=sql-bastion
local_port=6667
db_name=solo-platform
db_user=solo-platform

# Add more database configurations as needed:
# [another-database]
# project_id=your-project
# instance_name=your-instance
# region=us-central1
# zone=us-central1-a
# bastion_name=another-bastion
# local_port=6666
# db_name=your_database
# db_user=your_user
